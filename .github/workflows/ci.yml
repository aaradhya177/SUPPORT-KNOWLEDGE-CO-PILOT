name: CI

on:
  push:
  pull_request:

jobs:
  python-quality:
    name: Python quality and tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff
        run: ruff check .

      - name: Check Black formatting
        run: black --check .

      - name: Run tests
        run: pytest

  docker-build:
    name: Docker build smoke checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --file Dockerfile.backend --tag support-knowledge-copilot-backend:ci .

      - name: Build frontend image
        run: docker build --file Dockerfile.frontend --tag support-knowledge-copilot-frontend:ci .
