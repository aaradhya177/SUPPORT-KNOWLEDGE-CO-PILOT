services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - raw_docs_data:/app/data/raw
      - processed_docs_data:/app/data/processed
      - indexes_data:/app/indexes
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      BACKEND_URL: "http://backend:8000"
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  indexes_data:
  raw_docs_data:
  processed_docs_data:
