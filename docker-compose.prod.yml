services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: ${BACKEND_IMAGE:-support-knowledge-copilot-backend:prod}
    restart: unless-stopped
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      LLM_API_KEY: ${LLM_API_KEY:?Set LLM_API_KEY in the deployment environment}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-gemini-flash-lite-latest}
      SUPPORT_COPILOT_API_KEY: ${SUPPORT_COPILOT_API_KEY:?Set SUPPORT_COPILOT_API_KEY}
      SUPPORT_COPILOT_ADMIN_API_KEY: ${SUPPORT_COPILOT_ADMIN_API_KEY:?Set SUPPORT_COPILOT_ADMIN_API_KEY}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-small-en-v1.5}
      CHUNK_SIZE: ${CHUNK_SIZE:-800}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-120}
      DENSE_INDEX_PATH: ${DENSE_INDEX_PATH:-indexes/dense}
      BM25_INDEX_PATH: ${BM25_INDEX_PATH:-indexes/sparse}
      ENABLE_RERANKER: ${ENABLE_RERANKER:-false}
      RERANKER_MODEL_NAME: ${RERANKER_MODEL_NAME:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      INGESTION_JOBS_DB_PATH: ${INGESTION_JOBS_DB_PATH:-data/processed/ingestion_jobs.sqlite3}
      FEEDBACK_DB_PATH: ${FEEDBACK_DB_PATH:-data/processed/feedback.sqlite3}
      ENABLE_JUDGE_CACHE: ${ENABLE_JUDGE_CACHE:-true}
      JUDGE_CACHE_DB_PATH: ${JUDGE_CACHE_DB_PATH:-data/processed/judge_cache.sqlite3}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.55}
      QUERY_RATE_LIMIT_REQUESTS: ${QUERY_RATE_LIMIT_REQUESTS:-60}
      QUERY_RATE_LIMIT_WINDOW_SECONDS: ${QUERY_RATE_LIMIT_WINDOW_SECONDS:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    expose:
      - "8000"
    volumes:
      - raw_docs_data:/app/data/raw
      - processed_docs_data:/app/data/processed
      - indexes_data:/app/indexes
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: ${FRONTEND_IMAGE:-support-knowledge-copilot-frontend:prod}
    restart: unless-stopped
    environment:
      BACKEND_URL: "http://backend:8000"
    ports:
      - "${FRONTEND_BIND_ADDRESS:-127.0.0.1}:${FRONTEND_PORT:-8501}:8501"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  indexes_data:
  raw_docs_data:
  processed_docs_data:
